{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12 d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary"><i class="bi bi-person-badge"></i> Cuerpo Médico VitalCare</h2>
        <a href="{% url 'panel_control' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Volver al Panel
        </a>
    </div>

    <div class="col-12">
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Nombre del Doctor</th>
                            <th>Especialidad</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for doctor in doctores %}
                        <tr>
                            <td class="ps-4 fw-bold text-dark">{{ doctor.nombre }}</td>
                            <td><span class="badge bg-info text-dark">{{ doctor.especialidad }}</span></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-light text-muted" title="Editar (Próximamente)">
                                    <i class="bi bi-pencil"></i>
                                </button>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center py-5 text-muted">
                                <i class="bi bi-excrement-alert display-4 d-block mb-3"></i>
                                No hay doctores registrados en el sistema.
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
